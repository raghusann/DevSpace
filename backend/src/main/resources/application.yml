spring:
  application:
    name: devspace-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/devspace
    username: postgres
    password: Raghusann@123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  error:
    include-message: always

devspace:
  jwt:
    secret: ${JWT_SECRET:devspace-super-secret-key-change-in-production-min-256-bits-long!!}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:5173/github/callback}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.devspace: INFO
    org.springframework.security: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
